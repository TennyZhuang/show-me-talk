<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>show-me-talk</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>show-me-talk</h1>
      <p class="tagline">Talk is worth review. Code can wait collapsed.</p>

      <label class="toggle-row">
        <span>Enable auto-collapse</span>
        <input id="enabled" type="checkbox" />
      </label>

      <section class="card">
        <h2>Default keep-open files</h2>
        <ul>
          <li>Markdown and text docs</li>
          <li><code>llms.txt</code> and agent instructions</li>
          <li>PR templates and docs folders</li>
        </ul>
      </section>

      <button id="open-options" class="primary">Open settings</button>
      <p class="footnote">Yes, this project is completely vibe coded.</p>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
