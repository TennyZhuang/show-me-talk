name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package zip
        run: npm run package:extension

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: show-me-talk-release
          path: release/*.zip

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${GITHUB_REF_NAME:-v$(node -p "require('./package.json').version")}"
          gh release create "$TAG_NAME" release/*.zip --generate-notes --title "$TAG_NAME" || gh release upload "$TAG_NAME" release/*.zip --clobber
